<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Estacionamento</title>
    <link rel="stylesheet" href="estacionamento2.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Calculadora de Tarifas</h1>
            <p>Sistema de gestão de estacionamento</p>
        </header>

        <div id="container-aviso" class="aviso" hidden>
            <span id="mensagem-aviso"></span>
        </div>

        <section class="form-section">
            <label for="checkin">Entrada (checkin)</label>
            <input type="date" id="checkin" name="checkin">

            <label for="checkout">Saída (checkout)</label>
            <input type="date" id="checkout" name="checkout">

            <button type="button" class="btn-calcular" onclick="calcularTarifa()">Calcular Tarifa</button>
        </section>

        <section class="resultado-section">
            <div id="resultado">O valor total será exibido aqui.</div>
        </section>
    </main>

    <script src="estacionamento2.js"></script>
</body>
</html>
